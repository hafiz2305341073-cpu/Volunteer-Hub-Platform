<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Volunteer Hub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="brand">Volunteer Hub</div>
      <div id="navLinks" class="nav-links"></div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <div style="max-width: 500px; margin: 3rem auto;">
      <h1 class="page-title" style="text-align: center; margin-top: 0;">Create Your Account</h1>
      <p style="text-align: center; color: var(--muted); margin-bottom: 2rem;">Join our volunteer community and make a difference</p>

      <div class="form-wrap">
        <form id="register-form">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input id="name" type="text" placeholder="John Doe" required>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input id="email" type="email" placeholder="you@example.com" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Create a strong password" required>
          </div>

          <div class="form-group">
            <label for="role">I am a...</label>
            <select id="role" required>
              <option value="">Select your role</option>
              <option value="volunteer">Volunteer</option>
              <option value="ngo">NGO / Organization</option>
            </select>
          </div>

          <button class="btn btn-primary btn-block" type="submit" style="padding: 0.85rem;">Create Account</button>

          <div style="text-align: center; margin-top: 1.5rem; border-top: 1px solid #e2e8f0; padding-top: 1rem;">
            <p style="margin: 0.5rem 0; color: var(--muted);">Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600;">Sign in</a></p>
          </div>

          <div id="message" class="note" style="margin-top: 1rem; text-align: center;"></div>
        </form>
      </div>
    </div>

    <div class="footer-space"></div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
