<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events | Volunteer Hub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="brand">Volunteer Hub</div>
      <div id="navLinks" class="nav-links"></div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <h1 class="page-title">Discover Events</h1>
    <p style="color: var(--muted); margin-bottom: 2rem;">Find volunteer opportunities that match your interests and skills</p>

    <!-- Search and Filters -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
      <div class="form-group" style="margin-bottom: 0;">
        <input id="search" type="text" placeholder="Search events...">
      </div>
      <div class="form-group" style="margin-bottom: 0;">
        <input id="type-filter" type="text" placeholder="Filter by type (e.g., Education)">
      </div>
      <div class="form-group" style="margin-bottom: 0;">
        <input id="location-filter" type="text" placeholder="Filter by location">
      </div>
    </div>

    <!-- Events Grid -->
    <section id="events-list" class="card-grid">
      <!-- Events will be loaded here -->
    </section>

    <div id="empty-state" class="empty-state hidden">
      <p>No events found. Try adjusting your search or filters.</p>
    </div>

    <div class="footer-space"></div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/events.js"></script>
</body>
</html>
