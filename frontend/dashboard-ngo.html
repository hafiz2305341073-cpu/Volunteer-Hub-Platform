<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NGO Dashboard | Volunteer Hub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="brand">Volunteer Hub</div>
      <div id="navLinks" class="nav-links"></div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <h1 class="page-title">Organization Dashboard</h1>

    <!-- Create Event Section -->
    <section style="margin: 2rem 0;">
      <h2 class="section-title">Create New Event</h2>
      <div class="form-wrap">
        <form id="create-event-form">
          <div class="form-group">
            <label for="title">Event Title</label>
            <input id="title" type="text" placeholder="Community Cleanup Drive" required>
          </div>

          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" placeholder="Describe your event, goals, and what volunteers will do..." required></textarea>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
              <label for="date">Date</label>
              <input id="date" type="date" required>
            </div>
            <div class="form-group">
              <label for="location">Location</label>
              <input id="location" type="text" placeholder="City or venue" required>
            </div>
          </div>

          <div class="form-group">
            <label for="type">Event Type</label>
            <input id="type" type="text" placeholder="e.g., Education, Health, Environment" required>
          </div>

          <button class="btn btn-primary btn-block" type="submit" style="padding: 0.85rem;">Create Event</button>
          <div id="message" class="note" style="margin-top: 0.8rem; text-align: center;"></div>
        </form>
      </div>
    </section>

    <!-- Created Events Section -->
    <section>
      <div class="section-head">
        <h2 class="section-title">Your Events</h2>
      </div>
      <div id="my-events" class="card-grid">
        <!-- Events will be loaded here -->
      </div>
    </section>

    <!-- Applicants Section -->
    <section style="margin: 3rem 0;">
      <h2 class="section-title">Event Applicants</h2>
      <div id="applicants" style="display: grid; gap: 1rem;">
        <!-- Applicants will be loaded here -->
      </div>
    </section>

    <div class="footer-space"></div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/dashboard-ngo.js"></script>
</body>
</html>
