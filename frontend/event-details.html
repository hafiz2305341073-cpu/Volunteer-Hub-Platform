<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Details | Volunteer Hub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="brand">Volunteer Hub</div>
      <div id="navLinks" class="nav-links"></div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <div style="margin-top: 1.5rem;">
      <a href="events.html" style="color: var(--primary); font-weight: 500;">← Back to Events</a>
    </div>

    <section id="event-detail" class="card" style="margin: 2rem 0; padding: 2rem;">
      <!-- Event details will be loaded here -->
    </section>

    <!-- Action Buttons -->
    <div style="display: flex; gap: 1rem; margin: 2rem 0;">
      <button id="apply-action" class="btn btn-primary">Apply for Event</button>
      <a class="btn btn-secondary" href="events.html">Browse More Events</a>
    </div>

    <!-- Success/Error Message -->
    <div id="message" class="note" style="text-align: center; margin-top: 1rem;"></div>

    <div class="footer-space"></div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/event-details.js"></script>
</body>
</html>
