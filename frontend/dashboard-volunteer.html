<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer Dashboard | Volunteer Hub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="brand">Volunteer Hub</div>
      <div id="navLinks" class="nav-links"></div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <h1 class="page-title">Your Dashboard</h1>
    <p class="note">Welcome back, <strong id="welcome-name"></strong></p>

    <!-- Stats Section -->
    <section class="stats-grid">
      <div class="stat">
        <h4>Joined Events</h4>
        <p id="joined-events" style="color: var(--primary);">0</p>
      </div>
      <div class="stat accent">
        <h4>Total Hours</h4>
        <p id="hours">0</p>
      </div>
      <div class="stat success">
        <h4>Points Earned</h4>
        <p id="points">0</p>
      </div>
    </section>

    <!-- Joined Events Section -->
    <div class="section-head">
      <h2 class="section-title">Your Events</h2>
    </div>
    <section id="joined-events-list" class="card-grid">
      <!-- Events will be loaded here -->
    </section>

    <!-- Recommendations Section -->
    <div class="section-head">
      <h2 class="section-title">Recommended Events</h2>
      <a class="btn btn-secondary" href="events.html">Browse All</a>
    </div>
    <section id="recommendations" class="card-grid">
      <!-- Recommended events will be loaded here -->
    </section>

    <div class="footer-space"></div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/dashboard-volunteer.js"></script>
</body>
</html>
